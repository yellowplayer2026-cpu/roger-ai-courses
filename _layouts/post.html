---
layout: default
---

<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    <p style="color:var(--muted); margin-top:6px;">{{ page.date | date: "%Y-%m-%d" }}</p>

    {% if page.image %}
      <div class="post-hero">
        <img src="{{ page.image | relative_url }}" alt="" />
      </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
